<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>聚星樓巴士</title>

<style>
body{
  margin:0;
  font-family:-apple-system, Arial;
  background:#0f0f0f;
  color:white;
  padding:16px;
}

h1{
  font-size:26px;
  margin-bottom:10px;
}

.card{
  background:#1e1e1e;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
}

.route{
  font-size:20px;
  font-weight:bold;
  color:#ffd54f;
}

.dest{
  font-size:14px;
  color:#aaa;
  margin-top:2px;
}

.eta{
  margin-top:6px;
  color:#ccc;
}
</style>
</head>

<body>

<h1>📍 聚星樓（測試版）</h1>

<div class="card">
  <div class="route">69M</div>
  <div class="dest">往 葵芳站</div>
  <div class="eta">2 分鐘 / 12 分鐘</div>
</div>

<div class="card">
  <div class="route">969</div>
  <div class="dest">往 銅鑼灣</div>
  <div class="eta">即將到站 / 8 分鐘</div>
</div>

<div class="card">
  <div class="route">269C</div>
  <div class="dest">往 觀塘碼頭</div>
  <div class="eta">5 分鐘 / 18 分鐘</div>
</div>

</body>
</html>
