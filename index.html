<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>聚星樓巴士</title>

<style>
body{
  margin:0;
  font-family:-apple-system, Arial;
  background:#0f0f0f;
  color:white;
  padding:16px;
}

h1{
  font-size:26px;
  margin-bottom:6px;
}

#refreshTime{
  font-size:12px;
  color:#888;
  margin-bottom:12px;
}

.card{
  background:#1e1e1e;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
}

.route{
  font-size:20px;
  font-weight:bold;
  color:#ffd54f;
}

.dest{
  font-size:13px;
  color:#aaa;
  margin-top:2px;
}

.eta{
  margin-top:6px;
  color:#ccc;
}
</style>
</head>

<body>

<h1>📍 聚星樓</h1>
<div id="refreshTime">Loading...</div>

<div id="app">載入中...</div>

<script>

let stopId = "";

// 🧠 1. 搵聚星樓 stop ID（自動）
async function getStopId(){

  const res = await fetch("https://data.etabus.gov.hk/v1/transport/kmb/stop");
  const json = await res.json();

  const found = json.data.find(s =>
    s.name_en.toLowerCase().includes("tsui sing lau")
  );

  stopId = found.stop;
}

// 🚌 2. 拎所有 ETA
async function loadETA(){

  const res = await fetch(
    `https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stopId}`
  );

  const json = await res.json();

  const routes = {};

  json.data.forEach(b => {

    if(!routes[b.route]){
      routes[b.route] = {
        dest: b.dest_en,
        times: []
      };
    }

    if(b.eta){
      const mins = Math.round((new Date(b.eta)-new Date())/60000);
      routes[b.route].times.push(mins);
    }
  });

  // 排序 ETA
  Object.keys(routes).forEach(r=>{
    routes[r].times.sort((a,b)=>a-b);
  });

  // 轉 array + 排序（最快優先）
  let arr = Object.keys(routes).map(r=>{
    return {
      route:r,
      dest:routes[r].dest,
      t:routes[r].times
    };
  });

  arr.sort((a,b)=> (a.t[0]||999)-(b.t[0]||999));

  // render
  let html="";

  arr.forEach(r=>{

    html += `
    <div class="card">
      <div class="route">${r.route}</div>
      <div class="dest">往 ${r.dest}</div>
      <div class="eta">
        ${format(r.t[0])} / ${format(r.t[1])}
      </div>
    </div>
    `;
  });

  document.getElementById("app").innerHTML = html;

  document.getElementById("refreshTime").innerText =
    "Last update: " + new Date().toLocaleTimeString();
}

function format(m){
  if(m == null) return "—";
  if(m <= 0) return "即將到站";
  return m + " 分鐘";
}

// 🚀 init
async function init(){
  await getStopId();
  await loadETA();

  setInterval(loadETA,15000);
}

init();

</script>

</body>
</html>
